StylesPath = .github/styles
MinAlertLevel = suggestion

# Vale's built-in `Vale` style (repetition, spelling, capitalization) plus our
# custom `Project` rules (NoTbdTodo). We deliberately do NOT use the Microsoft or
# write-good packages: they flag domain acronyms (ADR/LLM/BRD/MCP — all defined in
# the glossary) and the repo's intentional spaced-em-dash style as errors,
# producing ~2500 false positives with no signal for an architecture-doc repo.
# Add targeted Project/ rules if you want to enforce specific editorial choices.
Packages =

[*.md]
BasedOnStyles = Vale, Project
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (§\S+)

[Vale]
# Don't double-up on repetition checks
Vale.Terms = NO
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (§\S+)

[write-good]
# Demote noisy grammar nags to suggestions
TooWordy = suggestion
Weasel = suggestion

[Microsoft]
# Allow contractions (common in technical prose)
Contractions = NO

[Vale]
# Don't double-up on repetition checks
Vale.Terms = NO
