StylesPath = .github/styles
MinAlertLevel = suggestion

# `vale sync` downloads these packages into StylesPath.
# BasedOnStyles below activates them. (Microsoft + write-good are third-party;
# only Project/ is committed — see .gitignore.)
Packages = Microsoft, write-good

[*.md]
BasedOnStyles = Microsoft, write-good, Project
BlockIgnores = (?s) *(```.*?```)
TokenIgnores = (§\S+)

[write-good]
# Demote noisy grammar nags to suggestions
TooWordy = suggestion
Weasel = suggestion

[Microsoft]
# Allow contractions (common in technical prose)
Contractions = NO

[Vale]
# Don't double-up on repetition checks
Vale.Terms = NO
