StylesPath = .github/styles
MinAlertLevel = suggestion

# Only the custom `Project` style is active. We deliberately do NOT use the
# built-in `Vale` style or the Microsoft/write-good packages:
#   - Microsoft/write-good: flag domain acronyms (ADR/LLM/BRD/MCP, all glossary-
#     defined) and the repo's intentional spaced-em-dash style (~2500 false positives)
#   - Vale.Spelling/Terms: flag snake_case identifiers (raw_text, blob_ref) and
#     enforce arbitrary casing (Dev->dev, OCR->ocr, Dedup->dedup) that conflicts with
#     how this technical architecture doc capitalizes terms (~245 false positives)
# The Project style carries the rules that matter here (NoTbdTodo). Add targeted
# Project/ rules if you want to enforce specific editorial choices.
Packages =

[*.md]
BasedOnStyles = Project
BlockIgnores = (?s) *(``.*?``)
TokenIgnores = (§\S+)
